<svg viewBox="0 0 880 192" width="880" height="192" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="snakeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="snakePath" d="M64 132 C160 20 320 152 408 40 S632 170 772 84" fill="none"/>
  </defs>
  <style>
    .bg { fill: #04111c; }
    .panel { fill: rgba(15, 23, 34, 0.88); stroke: rgba(96, 165, 250, 0.18); stroke-width: 1; }
    .track { fill: none; stroke: #164e63; stroke-width: 16; stroke-linecap: round; opacity: .35; }
    .highlight { fill: none; stroke: url(#snakeGrad); stroke-width: 16; stroke-linecap: round; stroke-dasharray: 24 180; animation: dash 3.5s linear infinite; }
    .head { fill: #fbbf24; filter: url(#glow); opacity: .95; }
    .text-title { font: 700 22px Inter, system-ui, sans-serif; fill: #7dd3fc; letter-spacing: 0.02em; }
    .text-label { font: 600 12px Inter, system-ui, sans-serif; fill: #cbd5e1; text-transform: uppercase; letter-spacing: 0.12em; }
    .text-value { font: 700 24px Inter, system-ui, sans-serif; fill: #ffffff; }
    .card { fill: #0f1723; stroke: rgba(56, 189, 248, 0.2); stroke-width: 1; rx: 16; }
    .bar-bg { fill: rgba(148, 163, 184, 0.16); rx: 4; }
    .bar-fill { fill: #38bdf8; rx: 4; }
    @keyframes dash { to { stroke-dashoffset: 204; } }
  </style>
  <rect class="bg" width="880" height="192" rx="24" ry="24"/>
  <rect class="panel" x="20" y="20" width="840" height="152" rx="20" ry="20"/>
  <text class="text-title" x="48" y="54">GitHub Pulse</text>
  <text class="text-label" x="48" y="78">Fresh stats, animated path</text>
  <path class="track" d="M64 132 C160 20 320 152 408 40 S632 170 772 84"/>
  <path class="highlight" d="M64 132 C160 20 320 152 408 40 S632 170 772 84"/>
  <g transform="translate(520 42)">
    <rect class="card" width="328" height="120"/>
    <text class="text-label" x="20" y="30">followers</text>
    <text class="text-value" x="20" y="60">23</text>
    <rect class="bar-bg" x="20" y="72" width="120" height="10"/>
    <rect class="bar-fill" x="20" y="72" width="80" height="10">
      <animate attributeName="width" values="50;90;50" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text class="text-label" x="172" y="30">public repos</text>
    <text class="text-value" x="172" y="60">31</text>
    <rect class="bar-bg" x="172" y="72" width="120" height="10"/>
    <rect class="bar-fill" x="172" y="72" width="70" height="10">
      <animate attributeName="width" values="40;70;40" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text class="text-label" x="20" y="100">following</text>
    <text class="text-value" x="20" y="130">14</text>
    <rect class="bar-bg" x="20" y="142" width="120" height="10"/>
    <rect class="bar-fill" x="20" y="142" width="42" height="10">
      <animate attributeName="width" values="25;42;25" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text class="text-label" x="172" y="100">since</text>
    <text class="text-value" x="172" y="130">2019</text>
  </g>
  <circle class="head" r="14" cx="64" cy="132">
    <animateMotion dur="4.2s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#snakePath"/>
    </animateMotion>
  </circle>
  <g fill="none" stroke="#38bdf8" stroke-opacity=".14" stroke-width="1.4">
    <circle cx="84" cy="40" r="15"/>
    <circle cx="120" cy="38" r="10"/>
    <circle cx="168" cy="55" r="8"/>
    <circle cx="240" cy="32" r="12"/>
  </g>
  <text x="48" y="34" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12">A motion trail that follows my GitHub journey.</text>
</svg>
